<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
color:cyan;
margin-bottom:15px;
}

#board{
display:grid;
grid-template-columns:repeat(9,40px);
grid-template-rows:repeat(9,40px);
gap:2px;
margin-bottom:20px;
}

.cell{
width:40px;
height:40px;
text-align:center;
font-size:20px;
border:1px solid #555;
background:#111;
color:white;
}

.fixed{
background:#222;
font-weight:bold;
color:cyan;
}

.selected{
outline:2px solid yellow;
}

#numbers{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
margin-bottom:20px;
}

button{
height:50px;
font-size:20px;
border:none;
border-radius:10px;
background:cyan;
font-weight:bold;
}

button:active{
transform:scale(0.95);
}

a{
margin-top:15px;
color:cyan;
font-size:20px;
text-decoration:none;
}
</style>

</head>
<body>

<h1>🔢 Sudoku</h1>

<div id="board"></div>

<div id="numbers"></div>

<button onclick="checkBoard()">Check Solution</button>

<a href="../Neuroverse.html">⬅ Back to Home</a>

<script>

const puzzle=[
[5,3,0,0,7,0,0,0,0],
[6,0,0,1,9,5,0,0,0],
[0,9,8,0,0,0,0,6,0],
[8,0,0,0,6,0,0,0,3],
[4,0,0,8,0,3,0,0,1],
[7,0,0,0,2,0,0,0,6],
[0,6,0,0,0,0,2,8,0],
[0,0,0,4,1,9,0,0,5],
[0,0,0,0,8,0,0,7,9]
];

const solution=[
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

const board=document.getElementById("board");
let selected=null;

for(let r=0;r<9;r++){

for(let c=0;c<9;c++){

let input=document.createElement("input");

input.maxLength=1;

input.className="cell";

if(puzzle[r][c]!=0){

input.value=puzzle[r][c];

input.disabled=true;

input.classList.add("fixed");

}

input.onclick=()=>{

document.querySelectorAll(".cell").forEach(x=>x.classList.remove("selected"));

input.classList.add("selected");

selected=input;

};

board.appendChild(input);

}

}

const numbers=document.getElementById("numbers");

for(let i=1;i<=9;i++){

let b=document.createElement("button");

b.innerHTML=i;

b.onclick=()=>{

if(selected && !selected.disabled){

selected.value=i;

}

};

numbers.appendChild(b);

}

function checkBoard(){

const cells=document.querySelectorAll(".cell");

let ok=true;

cells.forEach((cell,index)=>{

let r=Math.floor(index/9);

let c=index%9;

if(Number(cell.value)!==solution[r][c]){

ok=false;

}

});

if(ok){

alert("🎉 Congratulations! You solved the Sudoku!");

}else{

alert("❌ Some numbers are incorrect. Keep trying!");

}

}

</script>

</body>
</html>
